<header class="site-header">
  <nav class="site-nav">
    <div class="nav-left">
      <a href="/" class="site-logo" aria-label="Home">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="40" height="40">
          <polygon points="115,20 65,95 90,95 75,180 140,90 110,90" fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="bevel"/>
          <line x1="65" y1="95" x2="35" y2="95" stroke="currentColor" stroke-width="3" opacity="0.3"/>
          <line x1="140" y1="90" x2="170" y2="90" stroke="currentColor" stroke-width="3" opacity="0.3"/>
          <circle cx="35" cy="95" r="4" fill="currentColor" opacity="0.3"/>
          <circle cx="170" cy="90" r="4" fill="currentColor" opacity="0.3"/>
        </svg>
      </a>
    </div>
    <div class="nav-right">
      {{- range site.Menus.main }}
      <a href="{{ .URL | absLangURL }}" class="nav-link{{ if eq $.RelPermalink .URL }} active{{ end }}">{{ .Name }}</a>
      {{- end }}
    </div>
  </nav>
</header>
